<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MossPay | Manage Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #F8FAFC; --sidebar-bg: #FFFFFF; --card-bg: #FFFFFF; --text-main: #1E293B; --text-muted: #64748B; --primary-green: #29683B; --border-color: #E2E8F0; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
        .top-navbar { display: flex; align-items: center; justify-content: space-between; background: var(--card-bg); padding: 16px 24px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .nav-left { display: flex; align-items: center; gap: 16px; }
        .back-btn { font-size: 14px; cursor: pointer; background: none; border: none; color: var(--text-muted); font-weight: 600; padding: 0; transition: color 0.2s; display: flex; align-items: center; }
        .back-btn:hover { color: var(--primary-green); }
        .hamburger { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text-main); padding: 0; }
        .brand-logo { font-size: 20px; font-weight: 700; color: var(--primary-green); }
        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; position: fixed; top: 0; left: -260px; height: 100vh; transition: left 0.3s ease; z-index: 1000; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 24px; border-bottom: 1px solid var(--border-color); margin-bottom: 16px; }
        .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); }
        .nav-link { padding: 12px 24px; color: var(--text-muted); text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background-color: #F1F5F9; color: var(--primary-green); border-right: 3px solid var(--primary-green); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(2px); z-index: 999; opacity: 0; visibility: hidden; transition: 0.3s; }
        .overlay.active { opacity: 1; visibility: visible; }
        .main-content { padding: 32px 24px; max-width: 800px; margin: 0 auto; }
        .header { margin-bottom: 32px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .header p { margin: 8px 0 0 0; color: var(--text-muted); font-size: 15px; }
        .card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-full { grid-column: 1 / -1; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; box-sizing: border-box; transition: 0.2s; background: #F8FAFC; }
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: var(--primary-green); background: white; box-shadow: 0 0 0 3px rgba(41, 104, 59, 0.1); }
        .input-group textarea { resize: vertical; min-height: 100px; }
        .btn-save { background-color: var(--primary-green); color: white; border: none; padding: 14px 24px; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; width: 100%; margin-top: 24px; transition: 0.2s; }
        .btn-save:hover { background-color: #1f4f2c; transform: translateY(-1px); }
        #toast { position: fixed; bottom: 20px; right: 20px; background: #10B981; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 500; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 2000; }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <header class="top-navbar">
        <div class="nav-left">
            <button class="back-btn" onclick="window.history.back()">← Back</button>
            <button class="hamburger" onclick="toggleSidebar()">☰</button>
            <div class="brand-logo">🌿 MossPay</div>
        </div>
        <a href="/vendor/login" style="text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 500;">Log Out</a>
    </header>

    <div class="overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="appSidebar">
        <div class="sidebar-header"><div class="brand-logo" style="color: white;">MossPay</div><button class="close-btn" onclick="toggleSidebar()">✕</button></div>
        <a href="/vendor/dashboard" class="nav-link">Dashboard</a>
        <a href="/vendor/inventory" class="nav-link">Inventory Ledger</a>
        <a href="/vendor/transactions" class="nav-link">Transaction History</a>
        <a href="/vendor/your_bills" class="nav-link">Inbound Bills</a>
        <a href="/vendor/customer_insights" class="nav-link">Customer Insights</a>
        <a href="/vendor/offers" class="nav-link">Manage Offers</a>
        <a href="/vendor/discover" class="nav-link">Discover Vendors</a>
        <a href="/vendor/profile" class="nav-link">Manage Profile</a>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Manage Your Public Profile</h1>
            <p>This information will be visible to customers in the "Discover Vendors" section.</p>
        </div>

        <div class="card">
            <form onsubmit="saveProfile(event)">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Business Name (Read Only)</label>
                        <input type="text" value="{{ business_name }}" disabled style="color: #94a3b8; cursor: not-allowed;">
                    </div>
                    
                    <div class="input-group">
                        <label>Shop Category</label>
                        <input type="text" id="cat" placeholder="e.g., Organic Food, Handicrafts" value="{{ profile['shop_category'] if profile else '' }}">
                    </div>

                    <div class="input-group form-full">
                        <label>Shop Description (Bio)</label>
                        <textarea id="desc" placeholder="Tell customers what makes your business green!">{{ profile['description'] if profile else '' }}</textarea>
                    </div>

                    <div class="input-group">
                        <label>Logo Image URL</label>
                        <input type="text" id="logo" placeholder="https://.../your-logo.png" value="{{ profile['logo_url'] if profile else '' }}">
                    </div>

                    <div class="input-group">
                        <label>Website (Optional)</label>
                        <input type="text" id="web" placeholder="https://yourshop.com" value="{{ profile['website'] if profile else '' }}">
                    </div>

                    <div class="input-group">
                        <label>Contact Person</label>
                        <input type="text" id="person" placeholder="Full Name" value="{{ profile['contact_person'] if profile else '' }}">
                    </div>

                    <div class="input-group">
                        <label>Contact Mobile</label>
                        <input type="text" id="mobile" placeholder="Phone Number" value="{{ profile['contact_mobile'] if profile else '' }}">
                    </div>

                    <div class="input-group form-full">
                        <label>Detailed Shop Address</label>
                        <textarea id="addr" placeholder="Full street address...">{{ profile['detailed_address'] if profile else '' }}</textarea>
                    </div>
                </div>

                <button type="submit" class="btn-save">Save Profile Changes</button>
            </form>
        </div>
    </main>

    <div id="toast">✅ Profile saved successfully!</div>

    <script>
        function toggleSidebar() {
            document.getElementById('appSidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        async function saveProfile(event) {
            event.preventDefault();
            const payload = {
                shop_category: document.getElementById('cat').value,
                description: document.getElementById('desc').value,
                logo_url: document.getElementById('logo').value,
                website: document.getElementById('web').value,
                contact_person: document.getElementById('person').value,
                contact_mobile: document.getElementById('mobile').value,
                detailed_address: document.getElementById('addr').value
            };

            try {
                const response = await fetch('/api/save_profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                if(data.status === 'success') {
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3000);
                } else { alert(data.message); }
            } catch (error) { alert('Failed to save. Check terminal.'); }
        }
    </script>
</body>
</html>
